<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Candidato</title>

    <link rel="stylesheet" href="../style.css">
</head>

<body>

<div class="container">

    <div class="left">

        <form id="formCandidato">
            <h3>Cadastro de Candidato</h3>
            <div>
                <label>Nome:</label>
                <input type="text" id="nomeCandidato" placeholder="Digite seu nome completo">
            </div>

            <div>
                <label>E-mail:</label>
                <input type="text" id="emailCandidato" placeholder="Informe seu e-mail">
            </div>

            <div>
                <label>CPF:</label>
                <input type="number" id="cpfCandidato" placeholder="Somente números">
            </div>

            <div>
                <label>Idade:</label>
                <input type="number" id="idadeCandidato">
            </div>

            <div>
                <label>Estado:</label>
                <input type="text" id="estadoCandidato">
            </div>

            <div>
                <label>CEP:</label>
                <input type="text" id="cepCandidato">
            </div>

            <div>
                <label>Descrição Pessoal:</label>
                <textarea id="descricaoCandidato"></textarea>
            </div>

            <div>
                <label>Competências:</label>
                <select id="competenciasCandidato">
                    <option>Java</option>
                    <option>Javascript</option>
                    <option>Python</option>
                </select>
            </div>

            <button type="submit">Cadastrar</button>

        </form>

    </div>


    <div class="right">

        <div class="illustration">
            <img src="../../public/candidates.jpg" alt="">  
        </div>

    </div>


</div>


<script type="module" src="/src/repository/cadastrarEmpresa.ts"></script>

</body>
</html>
