<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Empresa</title>

    <link rel="stylesheet" href="../style.css">
</head>

<body>

<div class="container">

    <div class="left">
        <form id="formEmpresa">
            <h3>Cadastro de Empresa</h3>

            <div>
                <label>Nome da empresa:</label>
                <input type="text" id="nomeEmpresa" placeholder="Digite o nome da empresa">
            </div>

            <div>
                <label>Email corporativo:</label>
                <input type="text" id="emailEmpresa" placeholder="Informe o email">
            </div>

            <div>
                <label>CNPJ:</label>
                <input type="text" id="cnpjEmpresa" placeholder="Somente números">
            </div>

            <div>
                <label>País:</label>
                <input type="text" id="paisEmpresa">
            </div>

            <div>
                <label>Estado:</label>
                <input type="text" id="estadoEmpresa">
            </div>

            <div>
                <label>CEP:</label>
                <input type="text" id="cepEmpresa">
            </div>

            <div>
                <label>Descrição da empresa:</label>
                <textarea id="descricaoEmpresa"></textarea>
            </div>

            <button type="submit">Cadastrar</button>

        </form>

    </div>

    <div class="right">

        <div class="illustration">
            <img src="../../public/empresa.jpg" alt="">
        </div>

    </div>

</div>

<script type="module" src="/src/repository/cadastrarEmpresa.ts"></script>

</body>
</html>
